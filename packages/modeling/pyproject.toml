[project]
name = "quick-netters-modeling"
version = "0.1.0"
description = "Modeling interfaces and pipelines for Quick Netters"
requires-python = ">=3.11"
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
